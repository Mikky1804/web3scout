<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web3Scout – Discover Web3 Opportunities</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1a1f35 100%);
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border-bottom: 1px solid rgba(59, 130, 246, 0.2);
      padding: 32px 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    header h1 {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    header p {
      color: #94a3b8;
      font-size: 14px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 32px 20px;
    }

    .filter-section {
      background: #1e293b;
      border: 1px solid rgba(59, 130, 246, 0.15);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 32px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .filter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 12px;
      align-items: end;
    }

    input, select {
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid rgba(59, 130, 246, 0.3);
      background: #0f172a;
      color: #e2e8f0;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    input::placeholder {
      color: #64748b;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #3b82f6;
      background: #1a1f35;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    button {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    .sort-buttons {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .sort-btn {
      padding: 8px 16px;
      font-size: 12px;
      background: #0f172a;
      border: 1px solid rgba(59, 130, 246, 0.3);
      color: #e2e8f0;
    }

    .sort-btn.active {
      background: #3b82f6;
      border-color: #3b82f6;
    }

    .job-list {
      display: grid;
      gap: 16px;
    }

    .job-card {
      background: linear-gradient(135deg, #1e293b 0%, #263449 100%);
      border: 1px solid rgba(59, 130, 246, 0.15);
      border-radius: 12px;
      padding: 24px;
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .job-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.1), transparent);
      transition: left 0.5s ease;
    }

    .job-card:hover {
      border-color: rgba(59, 130, 246, 0.5);
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.15);
      transform: translateY(-4px);
    }

    .job-card:hover::before {
      left: 100%;
    }

    .job-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 16px;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .job-card h3 {
      font-size: 18px;
      font-weight: 600;
      color: #f1f5f9;
      margin: 0;
      flex: 1;
    }

    .job-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
      background: rgba(59, 130, 246, 0.2);
      color: #60a5fa;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    .job-badge.bounty {
      background: rgba(249, 115, 22, 0.2);
      color: #fb923c;
      border-color: rgba(249, 115, 22, 0.3);
    }

    .job-badge.grant {
      background: rgba(34, 197, 94, 0.2);
      color: #86efac;
      border-color: rgba(34, 197, 94, 0.3);
    }

    .job-meta {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 16px 0;
      padding: 16px 0;
      border-top: 1px solid rgba(59, 130, 246, 0.1);
      border-bottom: 1px solid rgba(59, 130, 246, 0.1);
      font-size: 13px;
      color: #94a3b8;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .job-description {
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.6;
      margin: 16px 0;
      position: relative;
      z-index: 1;
    }

    .job-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      position: relative;
      z-index: 1;
    }

    .apply-btn {
      padding: 10px 20px;
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      border: none;
      border-radius: 8px;
      text-decoration: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.2s ease;
      display: inline-block;
    }

    .apply-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(59, 130, 246, 0.3);
    }

    .salary-range {
      color: #22c55e;
      font-weight: 600;
      font-size: 14px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #94a3b8;
    }

    .empty-state h2 {
      font-size: 24px;
      margin-bottom: 8px;
      color: #cbd5e1;
    }

    .results-count {
      color: #94a3b8;
      font-size: 13px;
      margin-top: 8px;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: #1e293b;
      border-radius: 12px;
      padding: 32px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      border: 1px solid rgba(59, 130, 246, 0.15);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 24px;
    }

    .modal-header h2 {
      font-size: 24px;
      margin: 0;
      color: #f1f5f9;
    }

    .modal-close {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 24px;
      cursor: pointer;
      padding: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s ease;
    }

    .modal-close:hover {
      color: #f1f5f9;
    }

    .modal-section {
      margin-bottom: 24px;
    }

    .modal-section h3 {
      font-size: 14px;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .modal-section p {
      color: #cbd5e1;
      line-height: 1.6;
      font-size: 14px;
    }

    .skill-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .skill-tag {
      padding: 6px 12px;
      background: rgba(59, 130, 246, 0.15);
      color: #60a5fa;
      border-radius: 6px;
      font-size: 12px;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    .modal-action {
      display: flex;
      gap: 12px;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid rgba(59, 130, 246, 0.1);
    }

    .modal-action button {
      flex: 1;
    }

    .secondary-btn {
      background: #0f172a;
      border: 1px solid rgba(59, 130, 246, 0.3);
      color: #e2e8f0;
    }

    @media (max-width: 768px) {
      .filter-grid {
        grid-template-columns: 1fr;
      }

      .job-meta {
        grid-template-columns: 1fr;
      }

      .job-footer {
        flex-direction: column;
        gap: 16px;
        align-items: stretch;
      }

      .apply-btn {
        text-align: center;
      }

      header h1 {
        font-size: 24px;
      }

      .container {
        padding: 20px 16px;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>🚀 Web3Scout</h1>
  <p>Discover Web3 Opportunities – Jobs, Bounties, Grants & Research</p>
</header>

<div class="container">
  <div class="filter-section">
    <div class="filter-grid">
      <input 
        type="text" 
        id="searchInput" 
        placeholder="Search by skill, project, or title..." 
      />
      
      <select id="categoryFilter">
        <option value="">All Categories</option>
        <option value="Developer">Developer</option>
        <option value="Design">Design</option>
        <option value="Marketing">Marketing</option>
        <option value="Research">Research</option>
        <option value="Operations">Operations</option>
        <option value="Bounty">Bounty</option>
        <option value="Grant">Grant</option>
      </select>

      <button onclick="filterJobs()">Search</button>
    </div>

    <div class="sort-buttons">
      <button class="sort-btn active" onclick="sortJobs('recent')">Most Recent</button>
      <button class="sort-btn" onclick="sortJobs('salary')">Salary ↓</button>
      <button class="sort-btn" onclick="sortJobs('urgent')">Urgent</button>
    </div>
  </div>

  <div id="resultsCount" class="results-count"></div>
  <div id="jobList" class="job-list"></div>

</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalTitle"></h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalBody"></div>
    <div class="modal-action">
      <button class="secondary-btn" onclick="closeModal()">Close</button>
      <button id="modalApplyBtn" onclick="applyJob()">Apply Now</button>
    </div>
  </div>
</div>

<script>
let currentJob = null;
let currentSort = 'recent';

const jobs = [
  {
    id: 1,
    title: "Senior Solidity Developer",
    project: "DeFi Labs",
    description: "Build and audit smart contracts for next-gen DeFi protocols. Work on token mechanisms, liquidity pools, and risk management.",
    category: "Developer",
    skills: ["Solidity", "Smart Contracts", "Hardhat", "Security"],
    salary: "$8k - $15k/mo",
    type: "Full-time",
    deadline: "Mar 15, 2024",
    link: "https://example.com/job1",
    urgent: true
  },
  {
    id: 2,
    title: "Web3 Community Manager",
    project: "NFTVerse",
    description: "Lead community growth on Discord, Twitter, and Telegram. Run campaigns, manage moderation team, and create engagement strategies.",
    category: "Marketing",
    skills: ["Community Management", "Social Media", "Strategy"],
    salary: "$4k - $7k/mo",
    type: "Full-time",
    deadline: "Mar 20, 2024",
    link: "https://example.com/job2",
    urgent: false
  },
  {
    id: 3,
    title: "DAO Research Analyst",
    project: "GovernX",
    description: "Analyze governance proposals, tokenomics models, and protocol economics. Provide insights on DAO treasury management.",
    category: "Research",
    skills: ["Economics", "Data Analysis", "DAO Governance"],
    salary: "$5k - $9k/mo",
    type: "Contract",
    deadline: "Apr 1, 2024",
    link: "https://example.com/job3",
    urgent: false
  },
  {
    id: 4,
    title: "Frontend Bounty – dApp UI/UX",
    project: "ChainBuild",
    description: "Build a responsive multi-chain dApp interface. Deliverable includes React components, Web3 integration, and responsive design.",
    category: "Bounty",
    skills: ["React", "Tailwind CSS", "Web3.js", "UI/UX"],
    salary: "$500 - $2k",
    type: "Bounty",
    deadline: "Mar 10, 2024",
    link: "https://example.com/bounty1",
    urgent: true
  },
  {
    id: 5,
    title: "Protocol Grant – L2 Scalability Research",
    project: "Polygon",
    description: "Research and develop L2 scaling solutions for Polygon network. Build prototypes and publish technical findings.",
    category: "Grant",
    skills: ["Cryptography", "Blockchain", "Research", "C++"],
    salary: "$10k - $25k",
    type: "Grant",
    deadline: "Mar 25, 2024",
    link: "https://example.com/grant1",
    urgent: false
  },
  {
    id: 6,
    title: "Backend Engineer – Blockchain Indexer",
    project: "The Graph",
    description: "Develop indexing services for blockchain data. Optimize query performance, handle real-time data processing.",
    category: "Developer",
    skills: ["Rust", "GraphQL", "Database Design", "APIs"],
    salary: "$7k - $12k/mo",
    type: "Full-time",
    deadline: "Mar 28, 2024",
    link: "https://example.com/job4",
    urgent: false
  },
  {
    id: 7,
    title: "Brand Designer – NFT Project",
    project: "ArtBlock Studios",
    description: "Create brand identity, marketing materials, and NFT artwork designs. Work with creative direction and community feedback.",
    category: "Design",
    skills: ["Figma", "Branding", "Motion Design", "NFT Art"],
    salary: "$3k - $6k/mo",
    type: "Part-time",
    deadline: "Mar 22, 2024",
    link: "https://example.com/job5",
    urgent: false
  },
  {
    id: 8,
    title: "Operations Manager – Web3 Startup",
    project: "CryptoOps Inc",
    description: "Manage team operations, vendor relationships, and process optimization. Scale infrastructure for growing team.",
    category: "Operations",
    skills: ["Project Management", "Team Leadership", "Process Optimization"],
    salary: "$5k - $8k/mo",
    type: "Full-time",
    deadline: "Apr 5, 2024",
    link: "https://example.com/job6",
    urgent: false
  },
  {
    id: 9,
    title: "Smart Contract Security Audit",
    project: "Protocol Security",
    description: "Conduct comprehensive security audit on ERC-20/721 smart contracts. Deliver detailed report with findings and recommendations.",
    category: "Bounty",
    skills: ["Solidity", "Security", "Auditing", "Testing"],
    salary: "$1k - $5k",
    type: "Bounty",
    deadline: "Mar 12, 2024",
    link: "https://example.com/bounty2",
    urgent: true
  },
  {
    id: 10,
    title: "Crypto Economist – Token Design",
    project: "EconomicsLab",
    description: "Design tokenomics for new protocols. Model incentive structures, supply mechanics, and distribution strategies.",
    category: "Research",
    skills: ["Economics", "Token Design", "Modeling", "Data Science"],
    salary: "$6k - $11k/mo",
    type: "Contract",
    deadline: "Apr 2, 2024",
    link: "https://example.com/job7",
    urgent: false
  }
];

function getSortedJobs(jobsToSort) {
  const sorted = [...jobsToSort];
  
  if (currentSort === 'salary') {
    sorted.sort((a, b) => {
      const salaryA = parseInt(b.salary.split('$')[1].split('k')[0]) || 0;
      const salaryB = parseInt(a.salary.split('$')[1].split('k')[0]) || 0;
      return salaryA - salaryB;
    });
  } else if (currentSort === 'urgent') {
    sorted.sort((a, b) => b.urgent - a.urgent);
  }
  
  return sorted;
}

function displayJobs(filteredJobs) {
  const jobList = document.getElementById("jobList");
  const resultsCount = document.getElementById("resultsCount");
  
  if (filteredJobs.length === 0) {
    jobList.innerHTML = `
      <div class="empty-state">
        <h2>No opportunities found</h2>
        <p>Try adjusting your search filters or explore different categories.</p>
      </div>
    `;
    resultsCount.textContent = '';
    return;
  }

  resultsCount.textContent = `Showing ${filteredJobs.length} opportunit${filteredJobs.length !== 1 ? 'ies' : 'y'}`;
  jobList.innerHTML = '';

  filteredJobs.forEach(job => {
    const badgeClass = job.category === 'Bounty' ? 'bounty' : job.category === 'Grant' ? 'grant' : '';
    const urgentLabel = job.urgent ? '<span style="color: #f87171; font-weight: 600;">URGENT</span>' : '';
    
    const card = document.createElement('div');
    card.className = 'job-card';
    card.onclick = () => openModal(job);
    
    card.innerHTML = `
      <div class="job-header">
        <div>
          <h3>${job.title}</h3>
        </div>
        <span class="job-badge ${badgeClass}">${job.category}</span>
      </div>
      <div class="job-meta">
        <div class="meta-item">
          <span>📌</span> ${job.project}
        </div>
        <div class="meta-item">
          <span>💼</span> ${job.type}
        </div>
        <div class="meta-item">
          <span>📅</span> ${job.deadline}
        </div>
      </div>
      <p class="job-description">${job.description}</p>
      <div class="job-footer">
        <span class="salary-range">${job.salary}</span>
        <button class="apply-btn" onclick="event.stopPropagation(); openModal(this.closest('.job-card').id ? jobs.find(j => j.id == this.closest('.job-card').id) : job)">View Details</button>
      </div>
    `;
    
    jobList.appendChild(card);
  });
}

function filterJobs() {
  const searchValue = document.getElementById("searchInput").value.toLowerCase();
  const categoryValue = document.getElementById("categoryFilter").value;

  const filtered = jobs.filter(job => {
    const matchesSearch =
      job.title.toLowerCase().includes(searchValue) ||
      job.description.toLowerCase().includes(searchValue) ||
      job.project.toLowerCase().includes(searchValue) ||
      job.skills.some(skill => skill.toLowerCase().includes(searchValue));

    const matchesCategory = categoryValue === '' || job.category === categoryValue;

    return matchesSearch && matchesCategory;
  });

  const sorted = getSortedJobs(filtered);
  displayJobs(sorted);
}

function sortJobs(type) {
  currentSort = type;
  document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  filterJobs();
}

function openModal(job) {
  currentJob = job;
  document.getElementById('modalTitle').textContent = job.title;
  
  const skillsHTML = job.skills.map(skill => `<span class="skill-tag">${skill}</span>`).join('');
  
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-section">
      <h3>Project</h3>
      <p>${job.project}</p>
    </div>
    <div class="modal-section">
      <h3>Overview</h3>
      <p>${job.description}</p>
    </div>
    <div class="modal-section">
      <h3>Required Skills</h3>
      <div class="skill-tags">${skillsHTML}</div>
    </div>
    <div class="modal-section">
      <h3>Details</h3>
      <p><strong>Type:</strong> ${job.type}</p>
      <p><strong>Compensation:</strong> ${job.salary}</p>
      <p><strong>Deadline:</strong> ${job.deadline}</p>
      <p><strong>Category:</strong> ${job.category}</p>
    </div>
  `;
  
  document.getElementById('modal').classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  currentJob = null;
}

function applyJob() {
  if (currentJob && currentJob.link) {
    window.open(currentJob.link, '_blank');
  }
  closeModal();
}

document.getElementById('searchInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') filterJobs();
});

displayJobs(getSortedJobs(jobs));
</script>

</body>
</html>
